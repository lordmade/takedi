<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Image & Mobile Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container">
        <img src="https://i.postimg.cc/85Kx2gDN/Takedi-Logo.png" alt="Takedi Logo" class="logo">
        <nav>
            <ul id="nav-links">
                <li><a href="#">Services</a></li>
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">Bulk Orders</a></li>
                <li><a href="#" class="btn-quote">Get a Quote</a></li>
            </ul>
        </nav>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Your brand, brought to life <br/> <span class="text-gradient">on every dimension.</span></h1>
        <p>From large-format banners to bespoke corporate branding, Takedi delivers premium print solutions with color-accurate technology and rapid turnaround.</p>
        <div class="hero-btns">
            <a href="#" class="btn-primary">Start Your Project</a>
            <a href="#" class="btn-secondary">View Paper Stocks</a>
        </div>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
